<link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;600;700&family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{
  --p:#1a73e8;--pd:#1557b0;--pl:#e8f0fe;
  --surf:#fff;--bg:#f0f4f9;
  --safe:#1e8e3e;--safe-bg:#e6f4ea;--safe-light:#d4edda;
  --cond:#e37400;--cond-bg:#fff3e0;
  --danger:#d93025;--danger-bg:#fce8e6;
  --on:#202124;--onv:#5f6368;--out:#dadce0;--outs:#f1f3f4;
  --e1:0 1px 2px rgba(60,64,67,.3),0 1px 3px 1px rgba(60,64,67,.15);
  --e2:0 2px 6px rgba(60,64,67,.3),0 1px 10px rgba(60,64,67,.15);
  --lec:#1a73e8;--lec-bg:#e8f0fe;
  --pra:#1e8e3e;--pra-bg:#e6f4ea;
  --tut:#7c3aed;--tut-bg:#ede9fe;
  --ski:#ea8600;--ski-bg:#fff3e0;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Roboto',sans-serif;background:var(--bg);color:var(--on);min-height:100vh}

/* ── APP BAR ── */
.app-bar{background:var(--p);color:#fff;height:64px;padding:0 24px;display:flex;align-items:center;gap:14px;box-shadow:var(--e1);position:sticky;top:0;z-index:300}
.app-logo{width:36px;height:36px;background:rgba(255,255,255,.18);border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.app-title{font-family:'Google Sans',sans-serif;font-size:19px;font-weight:600}
.app-right{margin-left:auto;display:flex;align-items:center;gap:10px}
.uchip{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,.18);border-radius:20px;padding:4px 14px 4px 4px;font-size:13px;font-weight:500;opacity:0;transition:opacity .3s}
.uchip.show{opacity:1}
.uav{width:28px;height:28px;border-radius:50%;background:rgba(255,255,255,.3);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700}

/* ── PAGE ── */
.page{max-width:1000px;margin:0 auto;padding:24px 16px}

/* ── CARD (login/selector) ── */
.card{background:var(--surf);border-radius:16px;box-shadow:var(--e1);padding:24px;margin-bottom:20px}
.ch{display:flex;align-items:center;gap:12px;margin-bottom:18px}
.chi{width:38px;height:38px;border-radius:10px;background:var(--pl);color:var(--p);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.ct{font-family:'Google Sans',sans-serif;font-size:17px;font-weight:600}
.cs{font-size:12px;color:var(--onv);margin-top:2px}

/* ── FIELDS ── */
.fgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:14px}
.field{display:flex;flex-direction:column;gap:5px}
.field label{font-size:10.5px;font-weight:600;color:var(--onv);letter-spacing:.6px;text-transform:uppercase}
.fi{position:relative}
.fi input,.fi select{width:100%;height:50px;border:1.5px solid var(--out);border-radius:8px;padding:0 42px 0 13px;font-size:14px;font-family:'Roboto',sans-serif;color:var(--on);background:var(--surf);outline:none;transition:border-color .2s,box-shadow .2s;appearance:none}
.fi input:focus,.fi select:focus{border-color:var(--p);box-shadow:0 0 0 3px rgba(26,115,232,.1)}
.fic{position:absolute;right:11px;top:50%;transform:translateY(-50%);color:var(--onv);pointer-events:none}
.caprow{display:flex;gap:12px;align-items:flex-end;flex-wrap:wrap;margin-top:14px}
.capbox{border:1.5px solid var(--out);border-radius:8px;background:var(--outs);width:150px;height:50px;overflow:hidden;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:opacity .2s}
.capbox img{max-width:100%;max-height:100%;display:block}

/* ── BUTTONS ── */
.btn{display:inline-flex;align-items:center;gap:7px;height:40px;padding:0 20px;border-radius:20px;font-family:'Google Sans',sans-serif;font-size:14px;font-weight:500;cursor:pointer;border:none;transition:all .15s;white-space:nowrap}
.btn:active{transform:scale(.97)}
.btn-f{background:var(--p);color:#fff;box-shadow:var(--e1)}.btn-f:hover{background:var(--pd)}
.btn-t{background:var(--pl);color:var(--p)}.btn-t:hover{background:#d2e3fc}
.btn-o{background:transparent;color:var(--p);border:1.5px solid var(--p)}.btn-o:hover{background:var(--pl)}
.btn-sm{height:33px;padding:0 14px;font-size:13px;border-radius:17px}
.btn:disabled{opacity:.42;pointer-events:none}
.brow{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px}
.spin{width:17px;height:17px;border:2.5px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;display:none}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── BANNER ── */
.banner{display:none;align-items:center;gap:10px;padding:11px 16px;border-radius:8px;font-size:13.5px;font-weight:500;margin-bottom:16px;animation:sld .25s ease}
@keyframes sld{from{opacity:0;transform:translateY(-5px)}to{opacity:1;transform:none}}
.bn-err{background:var(--danger-bg);color:var(--danger)}
.bn-ok{background:var(--safe-bg);color:var(--safe)}
.bn-info{background:var(--pl);color:var(--p)}

/* ── STATS ROW ── */
.stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:12px;margin-bottom:24px}
.stat-card{background:var(--surf);border-radius:12px;box-shadow:var(--e1);padding:14px 16px;position:relative;overflow:hidden}
.stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;border-radius:12px 12px 0 0}
.sc-b::before{background:var(--p)}.sc-s::before{background:var(--safe)}.sc-c::before{background:var(--cond)}.sc-d::before{background:var(--danger)}.sc-g::before{background:#0891b2}
.stat-icon{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;margin-bottom:8px}
.si-b{background:#e8f0fe;color:var(--p)}.si-s{background:var(--safe-bg);color:var(--safe)}.si-c{background:#fff3e0;color:var(--cond)}.si-d{background:var(--danger-bg);color:var(--danger)}.si-g{background:#e0f7fa;color:#0891b2}
.stat-val{font-family:'Google Sans',sans-serif;font-size:24px;font-weight:700;line-height:1}
.sv-b{color:var(--p)}.sv-s{color:var(--safe)}.sv-c{color:var(--cond)}.sv-d{color:var(--danger)}.sv-g{color:#0891b2}
.stat-lbl{font-size:10.5px;font-weight:600;color:var(--onv);text-transform:uppercase;letter-spacing:.5px;margin-top:4px}

/* ── TOOLBAR ── */
.toolbar-bar{background:var(--surf);border-radius:12px;box-shadow:var(--e1);padding:12px 16px;margin-bottom:20px;display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.sw{flex:1;min-width:180px;position:relative}
.sw svg{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--onv);pointer-events:none}
.sw input{width:100%;height:37px;border:1.5px solid var(--out);border-radius:18px;padding:0 14px 0 36px;font-size:13.5px;font-family:'Roboto',sans-serif;outline:none;background:var(--outs);color:var(--on);transition:border-color .2s}
.sw input:focus{border-color:var(--p);background:var(--surf)}
.chips{display:flex;gap:7px;flex-wrap:wrap}
.chip{display:inline-flex;align-items:center;gap:5px;height:30px;padding:0 13px;border-radius:15px;font-size:12px;font-weight:500;cursor:pointer;border:1.5px solid var(--out);background:var(--surf);color:var(--onv);transition:all .15s;white-space:nowrap}
.chip.active{background:var(--pl);border-color:var(--p);color:var(--p)}
.chip.cs.active{background:var(--safe-bg);border-color:var(--safe);color:var(--safe)}
.chip.cc.active{background:#fff3e0;border-color:var(--cond);color:var(--cond)}
.chip.cd.active{background:var(--danger-bg);border-color:var(--danger);color:var(--danger)}

/* ═══════════════════════════════════════
   SUBJECT CARD
═══════════════════════════════════════ */
.subject-card{
  background:var(--surf);
  border-radius:16px;
  box-shadow:var(--e1);
  margin-bottom:16px;
  overflow:hidden;
  transition:box-shadow .2s;
  border-left:5px solid transparent;
  animation:cardIn .3s ease;
}
@keyframes cardIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.subject-card:hover{box-shadow:var(--e2)}
.subject-card.st-safe{border-left-color:var(--safe)}
.subject-card.st-cond{border-left-color:var(--cond)}
.subject-card.st-danger{border-left-color:var(--danger)}

/* card top bar */
.sc-header{
  display:flex;
  align-items:flex-start;
  justify-content:space-between;
  padding:18px 20px 14px;
  gap:16px;
  flex-wrap:wrap;
}
.sc-title-wrap{display:flex;flex-direction:column;gap:3px}
.sc-name{font-family:'Google Sans',sans-serif;font-size:16px;font-weight:700;color:var(--on);letter-spacing:.1px}
.sc-code{font-size:12px;color:var(--onv);font-weight:500;letter-spacing:.3px}
.sc-elig{font-size:11px;font-weight:600;border-radius:10px;padding:2px 9px;display:inline-block;margin-top:3px}
.elig-safe{background:var(--safe-bg);color:var(--safe)}
.elig-cond{background:#fff3e0;color:var(--cond)}
.elig-danger{background:var(--danger-bg);color:var(--danger)}

/* big % display */
.sc-pct-wrap{text-align:right;flex-shrink:0}
.sc-pct-num{font-family:'Google Sans',sans-serif;font-size:38px;font-weight:800;line-height:1}
.pct-safe{color:var(--safe)}.pct-cond{color:var(--cond)}.pct-danger{color:var(--danger)}
.sc-pct-bar-bg{width:100%;height:5px;background:#e8eaed;border-radius:3px;overflow:hidden;margin-top:6px}
.sc-pct-bar{height:100%;border-radius:3px;transition:width .8s cubic-bezier(.4,0,.2,1)}
.bar-safe{background:var(--safe)}.bar-cond{background:var(--cond)}.bar-danger{background:var(--danger)}

/* card body: two columns */
.sc-body{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:0;
  border-top:1px solid var(--out);
}
@media(max-width:640px){.sc-body{grid-template-columns:1fr}}

/* left: components */
.sc-components{padding:16px 20px;border-right:1px solid var(--out)}
@media(max-width:640px){.sc-components{border-right:none;border-bottom:1px solid var(--out)}}
.sc-section-title{font-size:11px;font-weight:700;color:var(--onv);text-transform:uppercase;letter-spacing:.7px;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.comp-row{display:flex;align-items:center;gap:0;margin-bottom:10px}
.comp-row:last-child{margin-bottom:0}
.comp-type-badge{display:inline-flex;align-items:center;height:22px;padding:0 9px;border-radius:11px;font-size:11px;font-weight:700;letter-spacing:.3px;text-transform:uppercase;flex-shrink:0;min-width:28px;justify-content:center}
.tb-L{background:var(--lec-bg);color:var(--lec)}
.tb-P{background:var(--pra-bg);color:var(--pra)}
.tb-T{background:var(--tut-bg);color:var(--tut)}
.tb-S{background:var(--ski-bg);color:var(--ski)}
.comp-info{flex:1;margin-left:10px}
.comp-name-line{display:flex;align-items:baseline;gap:6px}
.comp-name{font-size:13.5px;font-weight:500;color:var(--on)}
.comp-weight{font-size:11px;color:var(--onv);background:var(--outs);padding:1px 7px;border-radius:8px}
.comp-nums{font-size:12px;color:var(--onv);margin-top:2px}
.comp-pct-right{margin-left:auto;text-align:right;flex-shrink:0}
.comp-pct-val{font-family:'Google Sans',sans-serif;font-size:15px;font-weight:700}
.comp-bar-bg{width:60px;height:4px;background:#e8eaed;border-radius:2px;overflow:hidden;margin-top:4px;margin-left:auto}
.comp-bar-fill{height:100%;border-radius:2px}

/* formula row */
.formula-row{margin-top:12px;padding:8px 10px;background:var(--outs);border-radius:8px;font-size:11.5px;color:var(--onv);line-height:1.6}
.formula-eq{font-weight:600;font-size:12.5px}

/* right: projections */
.sc-projections{padding:16px 20px}
.proj-block{margin-bottom:14px}
.proj-block:last-child{margin-bottom:0}
.proj-block-title{font-size:11px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.proj-safe-title{color:var(--safe)}
.proj-need-title{color:var(--p)}
.proj-divider{height:1px;background:var(--out);margin:12px 0}

/* projection line items */
.proj-item{display:flex;align-items:center;justify-content:space-between;padding:4px 0;border-bottom:1px solid var(--outs)}
.proj-item:last-child{border-bottom:none}
.proj-item-left{display:flex;align-items:center;gap:7px;flex:1}
.proj-comp-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.proj-desc{font-size:12.5px;font-weight:500;color:var(--on)}
.proj-sub{font-size:11px;color:var(--onv);margin-left:4px}
.proj-count{font-size:12px;font-weight:600;color:var(--onv);background:var(--outs);border-radius:6px;padding:2px 8px;white-space:nowrap;font-variant-numeric:tabular-nums}

/* empty state */
.proj-empty{font-size:12.5px;color:var(--onv);font-style:italic;padding:4px 0}

/* status badge */
.status-badge{display:inline-flex;align-items:center;gap:5px;height:22px;padding:0 10px;border-radius:11px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.3px}
.sb-safe{background:var(--safe-bg);color:var(--safe)}
.sb-cond{background:#fff3e0;color:var(--cond)}
.sb-danger{background:var(--danger-bg);color:var(--danger)}

/* section header */
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:8px}
.section-title{font-family:'Google Sans',sans-serif;font-size:16px;font-weight:600;color:var(--on)}
.section-count{font-size:13px;color:var(--onv)}

#attsec{display:none;animation:fup .4s ease}
@keyframes fup{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}

@media(max-width:640px){
  .page{padding:12px 10px}
  .card{padding:18px 14px}
  .fgrid{grid-template-columns:1fr}
  .sc-pct-num{font-size:28px}
}
</style>
</head>
<body>

<!-- APP BAR -->
<header class="app-bar">
  <div class="app-logo">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="white"><path d="M5 13.18v4L12 21l7-3.82v-4L12 17l-7-3.82zM12 3L1 9l11 6 9-4.91V17h2V9L12 3z"/></svg>
  </div>
  <span class="app-title">KL Attendance</span>
  <div class="app-right">
    <div class="uchip" id="uchip">
      <div class="uav" id="uav">?</div>
      <span id="ulbl"></span>
    </div>
  </div>
</header>

<div class="page">

  <div class="banner" id="banner">
    <svg width="17" height="17" viewBox="0 0 24 24" fill="currentColor" id="bico"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/></svg>
    <span id="btxt"></span>
  </div>

  <!-- LOGIN -->
  <div class="card" id="loginCard">
    <div class="ch">
      <div class="chi"><svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg></div>
      <div><div class="ct">Sign In</div><div class="cs">KL University Student Portal</div></div>
    </div>
    <div class="fgrid">
      <div class="field"><label>User ID</label><div class="fi">
        <input id="user" type="text" placeholder="e.g. 2300090001" autocomplete="username">
        <span class="fic"><svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg></span>
      </div></div>
      <div class="field"><label>Password</label><div class="fi">
        <input id="pass" type="password" placeholder="Password" autocomplete="current-password">
        <span class="fic"><svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/></svg></span>
      </div></div>
    </div>
    <div class="caprow">
      <div class="capbox" id="capbox"><img id="capImg" alt="captcha"></div>
      <div class="field" style="flex:1;min-width:120px"><label>CAPTCHA</label><div class="fi">

<script>
/* ═══════════════════════════════════
   CONFIG
═══════════════════════════════════ */
const WORKER = "https://dawn-fire-931d.bhargavtodimela4.workers.dev";
let SID="", CSRF="";
let SUBJECTS=[], curFilter="all";

/* ═══ Component metadata ═══ */
const CMETA = {
  L:{ name:"Lecture",   weight:100, color:"#1a73e8", bg:"#e8f0fe", cls:"tb-L" },
  P:{ name:"Practical", weight:50,  color:"#1e8e3e", bg:"#e6f4ea", cls:"tb-P" },
  T:{ name:"Tutorial",  weight:25,  color:"#7c3aed", bg:"#ede9fe", cls:"tb-T" },
  S:{ name:"Skilling",  weight:25,  color:"#ea8600", bg:"#fff3e0", cls:"tb-S" },
};

function getCompKey(name="", ltps="") {
  const n=name.toLowerCase();
  if(n.includes("lecture"))   return "L";
  if(n.includes("practical")) return "P";
  if(n.includes("tutorial"))  return "T";
  if(n.includes("skilling"))  return "S";
  const l=ltps.toUpperCase();
  for(const k of ["L","P","T","S"]) if(l.includes(k)) return k;
  return "L";
}

function getStatus(p){ return p>=85?"safe":p>=75?"cond":"danger"; }
const ST_LABEL={safe:"Safe",cond:"Conditional",danger:"Danger"};
const ST_COLOR={safe:"var(--safe)",cond:"var(--cond)",danger:"var(--danger)"};

/* ═══════════════════════════════════
   GROUPING: multiple API rows → one subject
═══════════════════════════════════ */
function groupSubjects(rows) {
  const map = new Map();

  rows.forEach(r => {
    const code = (r.CourseCode||r.coursecode||r.CourseId||r.courseid||"").trim().replace(/[-_][LPTS]$/i,"");
    const name = (r.Coursedesc||r.courseName||"").trim();
    const key  = code || name;

    if (!map.has(key)) map.set(key, { name, code, eligibility: r.eligibility||r.Eligibility||"", components:[], _seenKeys:new Set() });

    const subj = map.get(key);
    const ltps = (r.Ltps||r.ltps||"").toUpperCase();
    const cname= r.componentName||r.ComponentName||"";
    const ckey = getCompKey(cname, ltps);
    if (subj._seenKeys.has(ckey)) return; // skip duplicates
    subj._seenKeys.add(ckey);

    const meta     = CMETA[ckey];
    const conducted= parseInt(r["Total Conducted"]||0)||0;
    const attended = parseInt(r["Total Attended"] ||0)||0;
    const absent   = parseInt(r["Total Absent"]   ||0)||0;
    const rawPct   = parseFloat(r.Percentage||0)||0;
    const pct      = rawPct>0 ? rawPct : (conducted>0 ? Math.round(attended/conducted*1000)/10 : 0);
    const apiW     = parseFloat(r.weightage||r.Weightage||r.weight||0);
    const weight   = apiW>0 ? apiW : meta.weight;

    subj.components.push({ key:ckey, name:meta.name, weight, pct, attended, conducted, absent, color:meta.color, bg:meta.bg, cls:meta.cls });
  });

  const ORDER={L:0,P:1,T:2,S:3};
  map.forEach(s=>{
    s.components.sort((a,b)=>(ORDER[a.key]||9)-(ORDER[b.key]||9));
    delete s._seenKeys;

    // Weighted aggregate
    let tw=0, ws=0;
    s.components.forEach(c=>{ tw+=c.weight; ws+=c.pct*c.weight; });
    s.aggPct = tw>0 ? Math.round(ws/tw*10)/10 : (s.components[0]?.pct||0);
    s.status = getStatus(s.aggPct);

    // Totals (sum of all components)
    s.conducted = s.components.reduce((a,c)=>a+c.conducted,0);
    s.attended  = s.components.reduce((a,c)=>a+c.attended, 0);
    s.absent    = s.components.reduce((a,c)=>a+c.absent,   0);
  });

  return Array.from(map.values());
}

/* ═══════════════════════════════════
   PROJECTION LOGIC
   Simulates: if N classes of component C are skipped/attended,
   how does the overall weighted % change?
   All projections based on OVERALL weighted %, not individual component %.
═══════════════════════════════════ */

function overallWith(components, changedIdx, newAtt, newCond) {
  let tw=0, ws=0;
  components.forEach((c,i)=>{
    const pct = i===changedIdx ? (newCond>0 ? newAtt/newCond*100 : 0) : c.pct;
    tw += c.weight;
    ws += pct * c.weight;
  });
  return tw>0 ? ws/tw : 0;
}

function buildProjections(subj) {
  const comps = subj.components;
  const CAP = 50;
  const projItems = [];

  comps.forEach((c, idx)=>{
    // ── SAFE TO SKIP (skip classes = conducted goes up, attended stays same) ──
    // Since skipping more always lowers overall%, this is monotonically decreasing
    // Find max N where overallWith(skip N) >= threshold
    let skip85=0, skip75=0;
    for(let n=1;n<=CAP;n++){
      const ov = overallWith(comps, idx, c.attended, c.conducted+n);
      if(ov >= 85) skip85=n; else break;
    }
    for(let n=1;n<=CAP;n++){
      const ov = overallWith(comps, idx, c.attended, c.conducted+n);
      if(ov >= 75) skip75=n; else break;
    }

    if(skip85 > 0) projItems.push({
      compName:c.name, compColor:c.color, n:skip85,
      futAtt:c.attended, futCond:c.conducted+skip85,
      threshold:85, action:'skip', label:'maintain 85% overall', capped:false
    });
    // Only show 75% skip if different from 85% skip
    if(skip75 > 0 && skip75 !== skip85) projItems.push({
      compName:c.name, compColor:c.color, n:skip75,
      futAtt:c.attended, futCond:c.conducted+skip75,
      threshold:75, action:'skip', label:'maintain 75% overall', capped:false
    });

    // ── NEED TO ATTEND (attend classes = both attended and conducted go up) ──
    // Find min N where overallWith(attend N) >= threshold
    const curOv = overallWith(comps, idx, c.attended, c.conducted);

    if(curOv < 85) {
      let found85 = false;
      for(let n=1;n<=CAP;n++){
        if(overallWith(comps, idx, c.attended+n, c.conducted+n) >= 85){
          projItems.push({ compName:c.name, compColor:c.color, n,
            futAtt:c.attended+n, futCond:c.conducted+n,
            threshold:85, action:'attend', label:'reach 85% overall', capped:false });
          found85=true; break;
        }
      }
      if(!found85) projItems.push({ compName:c.name, compColor:c.color, n:CAP+1,
        futAtt:c.attended+CAP, futCond:c.conducted+CAP,
        threshold:85, action:'attend', label:'reach 85% overall', capped:true });
    }

    if(curOv < 75) {
      let found75=false;
      for(let n=1;n<=CAP;n++){
        if(overallWith(comps, idx, c.attended+n, c.conducted+n) >= 75){
          projItems.push({ compName:c.name, compColor:c.color, n,
            futAtt:c.attended+n, futCond:c.conducted+n,
            threshold:75, action:'attend', label:'reach 75% overall', capped:false });
          found75=true; break;
        }
      }
      if(!found75) projItems.push({ compName:c.name, compColor:c.color, n:CAP+1,
        futAtt:c.attended+CAP, futCond:c.conducted+CAP,
        threshold:75, action:'attend', label:'reach 75% overall', capped:true });
    }
  });

  return projItems;
}

/* ═══════════════════════════════════
   RENDER ONE SUBJECT CARD
═══════════════════════════════════ */
function renderCard(s) {
  const st = s.status;
  const pctCls = `pct-${st}`;
  const barCls = `bar-${st}`;

  // ── Components column ──
  let compHtml = "";
  s.components.forEach(c => {
    const cpSt = getStatus(c.pct);
    const cpColor = ST_COLOR[cpSt];
    compHtml += `
    <div class="comp-row">
      <span class="comp-type-badge ${c.cls}">${c.key}</span>
      <div class="comp-info">
        <div class="comp-name-line">
          <span class="comp-name">${c.name}</span>
          <span class="comp-weight">Weightage: ${c.weight}%</span>
        </div>
        <div class="comp-nums">${c.attended}/${c.conducted} classes</div>
      </div>
      <div class="comp-pct-right">
        <div class="comp-pct-val" style="color:${cpColor}">${c.pct}%</div>
        <div class="comp-bar-bg">
          <div class="comp-bar-fill" style="width:${Math.min(c.pct,100)}%;background:${cpColor}"></div>
        </div>
      </div>
    </div>`;
  });

  // Show formula only if multiple components
  let formulaHtml = "";
  if (s.components.length > 1) {
    const parts = s.components.map(c=>`${c.key}×${c.weight}`).join(" + ");
    const tw    = s.components.reduce((a,c)=>a+c.weight,0);
    const detail= s.components.map(c=>`${c.pct}%×${c.weight}`).join(" + ");
    formulaHtml = `<div class="formula-row">
      <span style="color:var(--onv)">Weighted: (${detail}) ÷ ${tw} = </span>
      <span class="formula-eq" style="color:${ST_COLOR[st]}">${s.aggPct}%</span>
    </div>`;
  }

  // ── Projections column ──
  const projItems = buildProjections(s);

  const skipItems   = projItems.filter(p=>p.action==='skip');
  const attendItems = projItems.filter(p=>p.action==='attend');

  // Sort: 85% entries first, then 75%
  skipItems.sort((a,b)=>b.threshold-a.threshold);
  attendItems.sort((a,b)=>b.threshold-a.threshold);

  const renderProjItem = (item) => {
    const nLabel = item.capped ? `&gt;50` : item.n;
    return `<div class="proj-item">
      <div class="proj-item-left">
        <span class="proj-comp-dot" style="background:${item.compColor}"></span>
        <span class="proj-desc">${item.capped?'>50':item.n} ${item.compName}</span>
        <span class="proj-sub">${item.label}</span>
      </div>
      <span class="proj-count">(${item.futAtt}/${item.futCond})</span>
    </div>`;
  };

  let skipSectionHtml = `
    <div class="proj-block">
      <div class="proj-block-title proj-safe-title">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>
        SAFE TO SKIP <span style="font-weight:400;color:var(--onv);font-size:10px;margin-left:2px">(Any 1)</span>
      </div>
      ${skipItems.length>0 ? skipItems.map(renderProjItem).join("") : '<div class="proj-empty">No classes can be skipped safely</div>'}
    </div>`;

  let needSectionHtml = "";
  if(attendItems.length>0){
    needSectionHtml = `
    <div class="proj-block">
      <div class="proj-divider"></div>
      <div class="proj-block-title proj-need-title" style="margin-top:0">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/></svg>
        NEED TO ATTEND <span style="font-weight:400;color:var(--onv);font-size:10px;margin-left:2px">(Any 1)</span>
      </div>
      ${attendItems.map(renderProjItem).join("")}
    </div>`;
  }

  // Eligibility badge
  const eligText = s.eligibility || ST_LABEL[st];
  const eligCls  = st==="safe"?"elig-safe":st==="cond"?"elig-cond":"elig-danger";

  return `
  <div class="subject-card st-${st}">
    <div class="sc-header">
      <div class="sc-title-wrap">
        <span class="sc-name">${s.name||"—"}</span>
        ${s.code?`<span class="sc-code">${s.code}</span>`:""}
        <span class="sc-elig ${eligCls}">${eligText}</span>
      </div>
      <div class="sc-pct-wrap" style="min-width:80px">
        <div class="sc-pct-num ${pctCls}">${s.aggPct}%</div>
        <div class="sc-pct-bar-bg" style="width:80px">
          <div class="sc-pct-bar ${barCls}" style="width:${Math.min(s.aggPct,100)}%"></div>
        </div>
      </div>
    </div>
    <div class="sc-body">
      <div class="sc-components">
        <div class="sc-section-title">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M4 6H2v14c0 1.1.9 2 2 2h14v-2H4V6zm16-4H8c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-1 9H9V9h10v2zm-4 4H9v-2h6v2zm4-8H9V5h10v2z"/></svg>
          Components
        </div>
        ${compHtml}
        ${formulaHtml}
      </div>
      <div class="sc-projections">
        <div class="sc-section-title">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-5 14H7v-2h7v2zm3-4H7v-2h10v2zm0-4H7V7h10v2z"/></svg>
          Projections
        </div>
        ${skipSectionHtml}
        ${needSectionHtml}
      </div>
    </div>
  </div>`;
}

/* ═══════════════════════════════════
   STATS
═══════════════════════════════════ */
function renderStats(subjs) {
  const pcts  = subjs.map(s=>s.aggPct);
  const avg   = pcts.length ? (pcts.reduce((a,b)=>a+b,0)/pcts.length).toFixed(1) : 0;
  const safe  = subjs.filter(s=>s.status==="safe").length;
  const cond  = subjs.filter(s=>s.status==="cond").length;
  const dng   = subjs.filter(s=>s.status==="danger").length;
  const tc    = subjs.reduce((a,s)=>a+s.conducted,0);
  const ta    = subjs.reduce((a,s)=>a+s.attended, 0);
  const ov    = tc>0 ? ((ta/tc)*100).toFixed(1) : "—";
  const ac    = avg>=85?"s":avg>=75?"c":"d";
  document.getElementById("statsRow").innerHTML=`
    <div class="stat-card sc-b"><div class="stat-icon si-b"><svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zM9 17H7v-7h2v7zm4 0h-2V7h2v10zm4 0h-2v-4h2v4z"/></svg></div><div class="stat-val sv-b">${subjs.length}</div><div class="stat-lbl">Subjects</div></div>
    <div class="stat-card sc-${ac}"><div class="stat-icon si-${ac}"><svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M16 6l2.29 2.29-4.88 4.88-4-4L2 16.59 3.41 18l6-6 4 4 6.3-6.29L22 12V6z"/></svg></div><div class="stat-val sv-${ac}">${avg}%</div><div class="stat-lbl">Avg (Weighted)</div></div>
    <div class="stat-card sc-s"><div class="stat-icon si-s"><svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg></div><div class="stat-val sv-s">${safe}</div><div class="stat-lbl">Safe ≥85%</div></div>
    <div class="stat-card sc-c"><div class="stat-icon si-c"><svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4z"/></svg></div><div class="stat-val sv-c">${cond}</div><div class="stat-lbl">Conditional</div></div>
    <div class="stat-card sc-d"><div class="stat-icon si-d"><svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/></svg></div><div class="stat-val sv-d">${dng}</div><div class="stat-lbl">Danger &lt;75%</div></div>
    <div class="stat-card sc-g"><div class="stat-icon si-g"><svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zm.5 14.5h-1V11h1v5.5zm0-7h-1V7h1v2.5z"/></svg></div><div class="stat-val sv-g">${ov}%</div><div class="stat-lbl">Overall</div></div>
  `;
}

/* ═══════════════════════════════════
   FILTER & RENDER
═══════════════════════════════════ */
function setFilter(f,el){
  curFilter=f;
  document.querySelectorAll(".chip").forEach(c=>c.classList.remove("active"));
  el.classList.add("active"); applyFilters();
}
function applyFilters(){
  const q=document.getElementById("srch").value.toLowerCase();
  let list=SUBJECTS.filter(s=>{
    if(curFilter==="safe"   && s.status!=="safe")   return false;
    if(curFilter==="cond"   && s.status!=="cond")   return false;
    if(curFilter==="danger" && s.status!=="danger") return false;
    if(q && !s.name.toLowerCase().includes(q) && !s.code.toLowerCase().includes(q)) return false;
    return true;
  });
  const container=document.getElementById("cardsContainer");
  container.innerHTML = list.map(renderCard).join("");
  document.getElementById("secTitle").textContent = curFilter==="all" ? "All Subjects" :
    curFilter==="safe" ? "Safe Subjects" : curFilter==="cond" ? "Conditional Subjects" : "Danger Subjects";
  document.getElementById("secCount").textContent = `${list.length} of ${SUBJECTS.length} subject${SUBJECTS.length!==1?"s":""}`;
}

/* ═══════════════════════════════════
   UI HELPERS
═══════════════════════════════════ */
function showBanner(msg,type="info"){
  const b=document.getElementById("banner");
  const ico={err:'<path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/>',ok:'<path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 14l-4-4 1.41-1.41L10 13.17l6.59-6.59L18 8l-8 8z"/>',info:'<path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/>'};
  document.getElementById("bico").innerHTML=ico[type]||ico.info;
  document.getElementById("btxt").textContent=msg;
  b.className="banner bn-"+(type==="ok"?"ok":type==="err"?"err":"info");
  b.style.display="flex";
  if(type!=="err") setTimeout(()=>b.style.display="none",5000);
}
function ld(id,sid,on){document.getElementById(id).disabled=on;document.getElementById(sid).style.display=on?"inline-block":"none";}

/* ═══ CAPTCHA ═══ */
async function refreshCaptcha(){
  document.getElementById("capbox").style.opacity=".4";
  try{const r=await fetch(WORKER+"/captcha");SID=r.headers.get("x-session-id");document.getElementById("capImg").src=URL.createObjectURL(await r.blob());}
  catch{showBanner("Could not load captcha.","err");}
  document.getElementById("capbox").style.opacity="1";
}

/* ═══ LOGIN ═══ */
async function login(){
  ld("loginBtn","loginSpin",true);
  try{
    const res=await fetch(WORKER+"/login",{method:"POST",headers:{"Content-Type":"application/json","x-session-id":SID},body:JSON.stringify({username:user.value.trim(),password:pass.value,captcha:captcha.value.trim()})});
    const d=await res.json();
    if(!d.success){showBanner(d.message||"Login failed.","err");refreshCaptcha();ld("loginBtn","loginSpin",false);return;}
    SID=d.sessionId;CSRF=d.csrfToken;
    const fill=(id,arr)=>document.getElementById(id).innerHTML=arr.map(x=>`<option value="${x.value}">${x.label}</option>`).join("");
    fill("yearSel",d.academicYears);fill("semSel",d.semesters);
    document.getElementById("selCard").style.display="block";
    document.getElementById("loginCard").style.display="none";
    const uid=user.value.trim();
    document.getElementById("ulbl").textContent=uid;
    document.getElementById("uav").textContent=uid[0].toUpperCase();
    document.getElementById("uchip").classList.add("show");
    showBanner("Logged in!","ok");
  }catch{showBanner("Network error.","err");}
  ld("loginBtn","loginSpin",false);
}

/* ═══ FETCH ═══ */
async function fetchAttendance(){
  ld("fetchBtn","fetchSpin",true);
  try{
    const res=await fetch(WORKER+"/attendance",{method:"POST",headers:{"Content-Type":"application/json","x-session-id":SID},body:JSON.stringify({csrfToken:CSRF,academicYear:document.getElementById("yearSel").value,semesterId:document.getElementById("semSel").value})});
    const d=await res.json();
    SUBJECTS=groupSubjects(d.attendanceData||[]);
    renderStats(SUBJECTS);
    applyFilters();
    document.getElementById("attsec").style.display="block";
    setTimeout(()=>document.getElementById("attsec").scrollIntoView({behavior:"smooth",block:"start"}),120);
    showBanner(`Loaded ${SUBJECTS.length} subject${SUBJECTS.length!==1?"s":""}.`,"ok");
  }catch{showBanner("Failed to fetch.","err");}
  ld("fetchBtn","fetchSpin",false);
}

/* ═══ EXPORT CSV ═══ */
function exportCSV(){
  if(!SUBJECTS.length)return;
  const hdr=["Subject","Code","Weighted%","Status","Components","Conducted","Attended","Absent"];
  const rows=SUBJECTS.map(s=>[
    `"${s.name.replace(/"/g,'""')}"`,s.code,s.aggPct,
    ST_LABEL[s.status],
    `"${s.components.map(c=>`${c.key}:${c.pct}%(w${c.weight})`).join("; ")}"`,
    s.conducted,s.attended,s.absent
  ].join(","));
  const a=document.createElement("a");
  a.href=URL.createObjectURL(new Blob([[hdr.join(","),...rows].join("\n")],{type:"text/csv"}));
  a.download="kl_attendance.csv";a.click();
  showBanner("Exported!","ok");
}

/* ═══ INIT ═══ */
refreshCaptcha();
document.getElementById("user").addEventListener("keydown",e=>e.key==="Enter"&&document.getElementById("pass").focus());
document.getElementById("pass").addEventListener("keydown",e=>e.key==="Enter"&&document.getElementById("captcha").focus());
document.getElementById("captcha").addEventListener("keydown",e=>e.key==="Enter"&&login());
</script>
